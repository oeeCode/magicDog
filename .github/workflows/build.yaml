name: magicDog Actions
on:
  label:
    types:
      - created
  push:
    branches:
      - main
jobs:
  build:
    strategy:
      matrix:
        os: [ windows-latest ]
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
#    container:
#      image: docker.1ms.run/catthehacker/ubuntu:act-22.04
#      volumes:
#        - ubuntu_hostedtoolcache:/opt/hostedtoolcache
    steps:
      - run: echo "🍎 当前时间" & date
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: 'gradle'

      - name: Build native image
        uses: gradle/actions/setup-gradle@v3
        with:
          job-id: jdk21
          arguments: nativeCompile
          gradle-version: wrapper

      - run: echo "🐶 查看当前目录文件" & ls
      - name: "上传打包文件到服务器"
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST}}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/file/${{ matrix.os }}"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            docker-compose -f /file/${{ matrix.os }}/script/docker-compose.yml up --build -d
