spring:
  aop:
    proxy-target-class: false
  application:
    name: server
  profiles:
    active: ${PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  task:
    execution:
      pool:
        allow-parallel-ism: true
  main:
    keep-alive: true
    lazy-initialization: true
    allow-circular-references: true
    allow-bean-definition-overriding: true
  mvc:
    servlet:
      load-on-startup: 1
    pathmatch:
      matching-strategy: ant_path_matcher
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
  config:
    import:
      - doc.yml
      - logger.yml
      - captcha.yml
      - database.yml
      - mybatis.yml
      - security.yml
  web.resources.add-mappings: false

---
spring.config.activate.on-profile: dev
server:
  port: 7777
  tomcat:
    max-connections: 20000
    threads:
      max: 500
      min-spare: 100
---
spring.config.activate.on-profile: prod
server:
  port: 9999
  tomcat:
    max-connections: 20000
    threads:
      max: 1000
      min-spare: 100